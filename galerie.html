<section class="section gallery" id="galerie"><div class="page-num">Galerie XXVII</div><h2 class="section-title">Les premières traces d’une œuvre</h2><p class="lead galerie-street-intro">Chaque image porte une scène de transmission : une main, un regard, un passage vers l’œuvre.</p><div class="slider" data-slider><button class="slider-btn prev" type="button" aria-label="Image précédente">‹</button><div class="slides"><figure class="slide active"><img src="assets/img/gallery-children-colors.jpg" alt="Enfants et transmission artistique dans une galerie" decoding="async"><figcaption>La transmission commence là où l’enfant ose laisser une trace.</figcaption></figure><figure class="slide"><img src="assets/img/gallery-workshop-exhibition.jpg" alt="Atelier de jeunes artistes présenté en galerie" loading="lazy" decoding="async"><figcaption>Faire passer le geste de l’intime vers le public.</figcaption></figure><figure class="slide"><img src="assets/img/gallery-hands-painting.jpg" alt="Mains d’enfants en création artistique exposées en galerie" loading="lazy" decoding="async"><figcaption>Avant les mots, il y a la main, la couleur et le regard.</figcaption></figure><figure class="slide"><img src="assets/img/gallery-child-easel.jpg" alt="Jeune talent face à son œuvre dans un espace d’exposition" loading="lazy" decoding="async"><figcaption>Entrer dans l’histoire de l’art par son propre geste.</figcaption></figure><figure class="slide"><img src="assets/img/gallery-inclusion-art.jpg" alt="Inclusion artistique et jeunes talents dans une galerie" loading="lazy" decoding="async"><figcaption>Rendre l’art accessible, sans réduire son exigence.</figcaption></figure><figure class="slide"><img src="assets/img/gallery-featured-exhibition.jpg" alt="Œuvre de jeune artiste mise en scène dans une galerie" loading="lazy" decoding="async"><figcaption>Placer l’œuvre du jeune talent au centre du regard.</figcaption></figure><figure class="slide"><img src="gn5BN.jpg" alt="Jeune fille portant symboliquement le globe" loading="lazy" decoding="async"><figcaption>Soutenir un enfant créateur, c’est ouvrir un monde possible.</figcaption></figure><figure class="slide"><img src="xAIFY.jpg" alt="Plusieurs enfants peignant ensemble une toile" loading="lazy" decoding="async"><figcaption>Créer ensemble, apprendre à regarder ensemble.</figcaption></figure></div><button class="slider-btn next" type="button" aria-label="Image suivante">›</button><div class="dots" aria-label="Pagination du slider"></div></div></section>
