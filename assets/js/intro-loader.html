<script>
(function(){
  function ready(fn){
    if(document.readyState !== 'loading') fn();
    else document.addEventListener('DOMContentLoaded', fn);
  }
  ready(function(){
    var gate = document.getElementById('intro-gate');
    if(!gate) return;
    var video = document.getElementById('intro-video');
    document.body.classList.add('intro-active');
    function closeIntro(){
      if(gate.getAttribute('data-closed') === 'true') return;
      gate.setAttribute('data-closed','true');
      gate.classList.add('intro-leaving');
      document.body.classList.remove('intro-active');
      window.setTimeout(function(){ gate.remove(); }, 1500);
    }
    if(video){
      video.addEventListener('ended', closeIntro);
      video.addEventListener('error', function(){ window.setTimeout(closeIntro, 1200); });
    }
    window.setTimeout(closeIntro, 14000);
  });
})();
</script>
