name: Extract Fondation ZIP

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/unzip-fondation.yml'

permissions:
  contents: write

jobs:
  extract-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract ZIP into repository root
        shell: bash
        run: |
          set -euo pipefail
          ZIP_FILE="FONDATION-XXVII-paged-version-FIX (19).zip"
          if [ ! -f "$ZIP_FILE" ]; then
            echo "ZIP not found: $ZIP_FILE"
            exit 1
          fi
          rm -rf /tmp/fondation_extract
          mkdir -p /tmp/fondation_extract
          unzip -o "$ZIP_FILE" -d /tmp/fondation_extract
          echo "Extracted files:"
          find /tmp/fondation_extract -maxdepth 3 -type f | sort

          ROOT_DIR="/tmp/fondation_extract"
          if [ -f "/tmp/fondation_extract/index.html" ]; then
            ROOT_DIR="/tmp/fondation_extract"
          else
            CANDIDATE=$(find /tmp/fondation_extract -mindepth 1 -maxdepth 2 -type f -name 'index.html' -print -quit | xargs -r dirname)
            if [ -n "${CANDIDATE:-}" ]; then
              ROOT_DIR="$CANDIDATE"
            fi
          fi

          echo "Using extracted root: $ROOT_DIR"
          rsync -a --exclude='.git' --exclude='.github/workflows/unzip-fondation.yml' "$ROOT_DIR"/ ./

          # Repair duplicated head tags if present in extracted HTML.
          find . -maxdepth 2 -type f -name '*.html' -print0 | xargs -0 sed -i 's/<head><head>/<head>/g'

      - name: Commit extracted site files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git add -A
          git commit -m "Extract Fondation multipage ZIP"
          git push
